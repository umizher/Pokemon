# Calendario semilla (cero configuración) + MSRP de referencia (USD, mercado EN/US).
#
# Esta es la base del CALENDARIO: aunque no configures ninguna clave, la app
# muestra estos lanzamientos con su fecha y MSRP. Si configuras la clave gratuita
# de Best Buy, el radar añade automáticamente más productos (con fecha real y
# precio) y revisa el stock.
#
# NOTA: fechas y MSRP son de referencia pública del mercado US y conviene
# validarlos contra el anuncio oficial. `retailers` = tiendas donde típicamente
# se vende (informativo en el dashboard). `skus.bestbuy` se rellena solo cuando
# el radar de Best Buy encuentra el producto.

