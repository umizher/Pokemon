<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Monitor Pokémon TCG — Stock + MSRP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <div class="title">
      <h1>⚡ Monitor Pokémon TCG</h1>
      <p class="subtitle">Producto sellado de cartas · en stock a MSRP o por debajo</p>
    </div>
    <div class="meta">
      <span id="last-checked" class="muted">Cargando…</span>
    </div>
  </header>

  <section id="health" class="health" aria-label="Salud de providers"></section>

  <section class="controls">
    <input id="search" type="search" placeholder="Filtrar por set o tipo…" />
    <label class="checkbox">
      <input id="only-msrp" type="checkbox" /> Solo a MSRP o menos, en stock
    </label>
  </section>

  <main id="content">
    <p id="status" class="muted">Cargando estado…</p>
    <div id="cards"></div>
  </main>

  <footer>
    <p class="muted">
      Datos de <code>data/state.json</code>. Latencia ~10–15 min (cron gratis).
      No es auto-checkout: solo detección y alerta.
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
