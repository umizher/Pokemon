name: Actualizar calendario y stock

# Refresca el calendario y el stock de Best Buy, y guarda el resultado en
# docs/data/*.json. Como GitHub Pages sirve la carpeta /docs ("Deploy from a
# branch"), al hacer commit del estado el dashboard se actualiza solo.

on:
  schedule:
    # Cada 15 min (cron best-effort, puede retrasarse).
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -e .

      # Persiste dedupe/salud entre ejecuciones (para no repetir alertas).
      - name: Restaurar cache de estado
        uses: actions/cache@v4
        with:
          path: |
            docs/data/dedupe.json
            docs/data/health.json
          key: state-${{ github.run_id }}
          restore-keys: state-

      - name: Refrescar calendario + stock
        env:
          BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }}
          TARGET_API_KEY: ${{ secrets.TARGET_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # No romper el ciclo si una fuente externa falla.
        run: python -m tcg_monitor --radar --once || true

      - name: Guardar el estado actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/state.json docs/data/catalog.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el estado."
          else
            git commit -m "chore: actualizar estado del calendario [skip ci]"
            git push
          fi
