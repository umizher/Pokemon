name: TCG Monitor

on:
  schedule:
    # Cada 10 min. NOTA: el cron de GitHub Actions es "best-effort": puede
    # retrasarse varios minutos bajo carga. Granularidad mínima realista ~5 min.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Permite que el job haga commit del estado actualizado al repo.
permissions:
  contents: write

# Evita solapamiento si un ciclo tarda más que el intervalo.
concurrency:
  group: tcg-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: pip install -e .

      # Persiste el estado de dedupe entre ejecuciones (runners efímeros).
      # Clave por run_id + restore-keys de prefijo para recuperar el más reciente.
      - name: Restaurar cache de dedupe + salud
        uses: actions/cache@v4
        with:
          path: |
            docs/data/dedupe.json
            docs/data/health.json
          key: state-${{ github.run_id }}
          restore-keys: state-

      - name: Ejecutar radar + ciclo de stock
        env:
          BESTBUY_API_KEY: ${{ secrets.BESTBUY_API_KEY }}
          TARGET_API_KEY: ${{ secrets.TARGET_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_TO: ${{ secrets.SMTP_TO }}
          HTTP_PROXY_URL: ${{ secrets.HTTP_PROXY_URL }}
        run: python -m tcg_monitor --radar --once

      - name: Commit del estado actualizado
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/state.json docs/data/catalog.json
          if git diff --cached --quiet; then
            echo "Sin cambios en el estado."
          else
            git commit -m "chore: actualizar estado del monitor [skip ci]"
            git push
          fi
